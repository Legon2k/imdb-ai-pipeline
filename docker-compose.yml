name: imdb-ai-pipeline

services:
  # ==========================================
  # 1. INFRASTRUCTURE (DB, Message Broker, UI)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: imdb_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: imdb_redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: imdb_redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - internal_network
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================
  # 2. DATA INGESTION (Scraper)
  # ==========================================
  scraper:
    container_name: imdb_scraper
    build:
      context: .
      target: scraper
    env_file:
      - .env
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal_network

  # ==========================================
  # 3. BACKGROUND WORKERS (.NET 10 & Go)
  # ==========================================
  # Original .NET 10 Worker
  worker:
    container_name: imdb_worker
    build:
      context: .
      dockerfile: src/worker_dotnet/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  # New High-Performance Go Worker
  worker_go:
    container_name: imdb_worker_go
    build:
      context: .
      dockerfile: src/worker_go/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "2112:2112"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  # ==========================================
  # 4. API GATEWAY (FastAPI)
  # ==========================================
  api:
    container_name: imdb_api
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # 5. AI BACKGROUND WORKER (Python)
  # ==========================================
  worker_ai:
    container_name: imdb_ai_worker
    build:
      context: .
      target: worker_ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  prometheus:
    image: prom/prometheus:latest
    container_name: imdb_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      worker_go:
        condition: service_started
      worker_ai:
        condition: service_started
    networks:
      - internal_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: imdb_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"  # Grafana UI port
    volumes:
      - grafana_data:/var/lib/grafana
      # Automatically provision the Prometheus datasource
      - ./infra/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - internal_network

  # ==========================================
  # 6. CONTRACT TESTS (Manual)
  # ==========================================
  contract-tests:
    container_name: imdb_contract_tests
    restart: "no"
    build:
      context: .
      target: contract_tests
    env_file:
      - .env
    networks:
      - internal_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: imdb_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

networks:
  internal_network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  pgadmin_data:
  grafana_data:
