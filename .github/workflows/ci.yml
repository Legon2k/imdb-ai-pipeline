name: CI Pipeline

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  # ====================== PYTHON CHECKS ======================
  python-checks:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Synchronize all python project environments using localized uv toolchain
      - name: Install all dependencies
        run: |
          uv sync --project src/scraper_python
          uv sync --project src/api_fastapi
          uv sync --project src/worker_ai_python

      # Lint check using uv execution context inside the scraper folder
      - name: Ruff lint (scraper)
        run: uv run --project src/scraper_python ruff check .

      # Format validation using uv execution context inside the scraper folder
      - name: Ruff format check (scraper)
        run: uv run --project src/scraper_python ruff format --check .

      - name: Ruff lint (api)
        run: uv run --project src/api_fastapi ruff check .

      - name: Ruff format check (api)
        run: uv run --project src/api_fastapi ruff format --check .

      - name: Ruff lint (AI worker)
        run: uv run --project src/worker_ai_python ruff check .

      - name: Ruff format check (AI worker)
        run: uv run --project src/worker_ai_python ruff format --check .

      - name: Scraper unit tests
        run: uv run --project src/scraper_python python -m unittest discover -s src/scraper_python/tests

      - name: API smoke tests
        run: |
          # Need worker_ai_python dependencies because some tests import its modules
          uv sync --project src/api_fastapi
          uv run --project src/api_fastapi pip install "redis>=5.0.0"
          uv run --project src/api_fastapi python -m unittest discover -s src/api_fastapi/tests

  # ====================== .NET CHECKS ======================
  dotnet-checks:
    name: .NET 10 Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ${{ github.workspace }}/src/worker_dotnet/**/bin
            ${{ github.workspace }}/src/worker_dotnet/**/obj
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/ImdbWorker.slnx', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Restore dependencies
        run: dotnet restore src/worker_dotnet/ImdbWorker.slnx

      - name: Build Solution
        run: dotnet build src/worker_dotnet/ImdbWorker.slnx --no-restore --configuration Release

  # ====================== DOCKER BUILD CHECK ======================
  docker-build:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [python-checks, dotnet-checks]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build entire microservice infrastructure
        run: docker compose build --no-cache
        env:
          DOCKER_BUILDKIT: 1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scan-ref: |
            imdb-ai-pipeline-scraper
            imdb-ai-pipeline-api
            imdb-ai-pipeline-worker
            imdb-ai-pipeline-worker_ai